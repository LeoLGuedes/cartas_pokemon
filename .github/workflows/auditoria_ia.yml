name: Bug Hunter AI - Code Review

on:
  push:
    branches:
      - antes_de_producao

jobs:
  auditar_codigo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para o git diff funcionar corretamente

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install -r "Agentes IA/requirements.txt"

      - name: Executar Auditoria (CrewAI)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python "Agentes IA/main.py"

      - name: Enviar Relatório por Email (Resend)
        if: success()
        run: |
          if [ -f relatorio_auditoria.md ]; then
            CONTEUDO=$(cat relatorio_auditoria.md | jq -Rs .)
            curl -s -X POST "https://api.resend.com/emails" \
              -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"from\": \"Bug Hunter AI <onboarding@resend.dev>\",
                \"to\": [\"${{ secrets.EMAIL_DESTINO }}\"],
                \"subject\": \"🤖 Relatório de Auditoria IA - Novos Commits\",
                \"text\": ${CONTEUDO}
              }"
          else
            echo "Nenhum relatório gerado. Pulando envio de email."
          fi
